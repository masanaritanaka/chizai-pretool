name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple Developer 証明書がある場合は以下を secrets に追加して正式署名・公証を行う:
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          # APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'chizai-pretool ${{ github.ref_name }}'
          releaseBody: |
            chizai-pretool ${{ github.ref_name }}

            Windows (.msi / .exe) と macOS (.dmg, Universal) のインストーラはこのリリースの Assets からダウンロードできます。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # 正式署名・公証が必要な場合は以下を secrets に追加して Apple Developer 証明書を設定する:
      # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
      # APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD
      # 現状は tauri.conf.json の bundle.macOS.signingIdentity: "-" による ad-hoc 署名のみ。
      # ユーザーは右クリック→開く が必要（Gatekeeper / Notarization 未通過のため）。
